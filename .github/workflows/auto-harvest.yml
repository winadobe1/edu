name: 🔄 Auto Harvest M3U TV Channels

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install dependencies
        run: npm install

      - name: ⛏️ Harvest Merah
        run: node scripts/extract_merah.js
        continue-on-error: true

      - name: ⛏️ Harvest Sky Italia
        run: node scripts/get-sky.js
        continue-on-error: true

      - name: ⛏️ Harvest Vavoo
        run: node scripts/get-vavoo.js
        continue-on-error: true

      - name: ⛏️ Harvest Sportzx
        run: node scripts/get-sportzx.js
        continue-on-error: true

      - name: ⛏️ Harvest Last Minute Sport
        run: node scripts/get-sport-lastminute.js
        continue-on-error: true

      - name: ⛏️ Harvest Enak
        run: node scripts/extract_enak.js
        continue-on-error: true

      - name: 📋 Cek file hasil
        run: ls -lh *.m3u8 2>/dev/null || echo "Tidak ada .m3u8 dihasilkan"

      - name: 📤 Auto-Commit & Push
        run: |
          git config user.name "TV-Harvester-Bot"
          git config user.email "bot@github.actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add *.m3u8
          git diff --staged --quiet && echo "Tidak ada perubahan" || (git commit -m "🔄 Update M3U $(date -u +'%Y-%m-%d %H:%M UTC')" && git pull --rebase && git push)
